<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Billing Rental MANTUL PS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

header{
background:#445eef;
padding:15px;
font-size:22px;
font-weight:600;
text-align:center;
}

.dashboard{
display:flex;
gap:15px;
padding:15px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
min-width:150px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
padding:15px;
}

.pscard{
padding:15px;
border-radius:12px;
transition:background 0.4s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.pscard{
transition:background 0.5s ease, transform 0.2s;
}

.pscard:hover{

transform:scale(1.02);

}

button{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
transition:all 0.15s ease;
}

button:hover{
transform:scale(1.05);
}

button:active{
transform:scale(0.92);
}

.timerWarning{
animation:blink 1s infinite;
}

@keyframes blink{

0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}

}

@keyframes blink{

0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}

}

.kosong{background:#16a34a}
.main{background:#2563eb}
.hampir{background:#f59e0b}
.habis{background:#dc2626}

.timer{
font-size:28px;
margin:10px 0;
}

button{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.start{background:#22c55e}
.pause{background:#f59e0b}
.reset{background:#ef4444}
.bayar{background:#3b82f6}

.menuGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:6px;
margin-top:10px;
}

.snackBtn{
background:#334155;
padding:6px;
border-radius:6px;
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
transition:0.2s;
}

.snackBtn:hover{
background:#475569;
transform:scale(1.05);
}

.qtyBox{
display:flex;
gap:5px;
margin-top:4px;
}

.qtyBox button{
background:#64748b;
padding:2px 6px;
}

.reset{
background:#ef4444;
color:white;
}

.tambah{
background:#22c55e;
color:white;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

</style>
</head>

<body>

<header>BILLING RENTAL MANTUL PLAYSTATION</header>

<div class="dashboard">

<div class="card">
Total Pendapatan
<h2 id="totalPend">0</h2>
<button onclick="resetPendapatan()">Reset Pendapatan</button>
</div>

</div>

<div class="container" id="psContainer"></div>

<div style="padding:15px">

<h3>Riwayat Transaksi</h3>
<button onclick="hapusRiwayat()">Hapus Riwayat</button>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>PS</th>
<th>Nama</th>
<th>Total</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<audio id="alarm10">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<audio id="alarm0">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

const psList=[
{nama:"PS1",tipe:"PS3"},
{nama:"PS2",tipe:"PS3"},
{nama:"PS3",tipe:"PS3"},
{nama:"PS4",tipe:"PS4"},
{nama:"PS5",tipe:"PS4"}
]

const hargaPS3={1:5000,2:10000,3:13000,5:22000}
const hargaPS4={1:8000,2:15000,3:22000,5:38000}

let dataPS=JSON.parse(localStorage.getItem("dataPS"))||psList.map(()=>({
nama:"",
jam:1,
detik:0,
jalan:false,
snack:{},
peringatan:false
}))

let transaksi=JSON.parse(localStorage.getItem("trans"))||[]
let pendapatan=parseInt(localStorage.getItem("pend"))||0

const menu=[
{nama:"Pop Mie",harga:7000},
{nama:"Chuba",harga:1000},
{nama:"Chitato Lite",harga:2000},
{nama:"Good Time",harga:2000},
{nama:"Oreo",harga:2000},
{nama:"Beng Beng",harga:3000},
{nama:"Kapal Api",harga:5000},
{nama:"Good Day",harga:5000},
{nama:"Tea Jus",harga:3000},
{nama:"Teh Tarik",harga:7000},
{nama:"Nutrisari",harga:5000}
]

function format(w){

let h=Math.floor(w/3600)
let m=Math.floor((w%3600)/60)
let s=w%60

return String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0')

}

function getStatusClass(p){

if(!p.jalan && p.detik==0)return "kosong"
if(p.jalan && p.detik>600)return "main"
if(p.jalan && p.detik<=600 && p.detik>0)return "hampir"
if(p.detik==0 && !p.jalan)return "habis"

}

function hargaMain(i){

let tipe=psList[i].tipe
let jam=dataPS[i].jam

if(tipe=="PS3")return hargaPS3[jam]
else return hargaPS4[jam]

}

function snackTotal(snack){

let total=0

for(let i in snack){

let m=menu[i]
total+=m.harga*snack[i]

}

return total

}

function tambahSnack(ps,index){

dataPS[ps].snack[index]=(dataPS[ps].snack[index]||0)+1

save()
render()

}

function kurangSnack(ps,index){

if(dataPS[ps].snack[index]){

dataPS[ps].snack[index]--

if(dataPS[ps].snack[index]<=0)delete dataPS[ps].snack[index]

}

save()
render()

}

function start(i){

if(dataPS[i].detik==0){

dataPS[i].detik=dataPS[i].jam*3600

}

dataPS[i].jalan=true
dataPS[i].peringatan=false

save()

}

function pause(i){

dataPS[i].jalan=false
save()

}

function resetTimer(i){

if(confirm("Reset timer "+psList[i].nama+" ?")){

dataPS[i].detik=0
dataPS[i].jalan=false
dataPS[i].peringatan=false
dataPS[i].snack={}

save()
render()

}

}

function tambah30(i){

dataPS[i].detik += 1800

save()
render()

}

function tambah1jam(i){

dataPS[i].detik += 3600

save()
render()

}

function bayar(i){

let totalMain=hargaMain(i)
let totalSnack=snackTotal(dataPS[i].snack)
let total=totalMain+totalSnack

pendapatan+=total

let now=new Date()

transaksi.push({
tanggal:now.toLocaleString(),
ps:psList[i].nama,
nama:dataPS[i].nama,
total
})

cetakStruk(i,totalMain,totalSnack,total)

dataPS[i].snack={}

save()
render()

}

function cetakStruk(i,main,snack,total){

let w=window.open("","","width=300")

w.document.write(`
<h3>RENTAL MANTUL PS</h3>
<hr>
PS : ${psList[i].nama}<br>
Nama : ${dataPS[i].nama}<br>
Paket : ${dataPS[i].jam} Jam<br>
<hr>
Main : Rp${main}<br>
Snack : Rp${snack}<br>
<hr>
TOTAL : Rp${total}
`)

w.print()

}

function hapusRiwayat(){

if(confirm("Hapus semua riwayat transaksi?")){

transaksi=[]
save()
render()

}

}

function resetPendapatan(){

if(confirm("Reset total pendapatan?")){

pendapatan=0
save()
render()

}

}

function render(){

let html=""

psList.forEach((ps,i)=>{

let p=dataPS[i]

let snackHTML=""

menu.forEach((m,index)=>{

let qty=p.snack[index]||0

snackHTML+=`

<div class="snackBtn">

${m.nama}
Rp${m.harga}

<div class="qtyBox">

<button onclick="kurangSnack(${i},${index})">-</button>
${qty}
<button onclick="tambahSnack(${i},${index})">+</button>

</div>

</div>

`

})

let total=hargaMain(i)+snackTotal(p.snack)

html+=`

<div class="pscard ${getStatusClass(p)}">

<h3>${ps.nama} (${ps.tipe})</h3>

<input placeholder="Nama pemain"
value="${p.nama}"
oninput="dataPS[${i}].nama=this.value;save()">

<select onchange="dataPS[${i}].jam=this.value;save();">

<option value="1" ${p.jam==1?"selected":""}>1 Jam</option>
<option value="2" ${p.jam==2?"selected":""}>2 Jam</option>
<option value="3" ${p.jam==3?"selected":""}>3 Jam</option>
<option value="5" ${p.jam==5?"selected":""}>5 Jam</option>

</select>

<div class="timer ${p.detik<=600 && p.detik>0 ? 'timerWarning' : ''}">
${format(p.detik)}
</div>

<button class="start" onclick="start(${i})">Start</button>
<button class="pause" onclick="pause(${i})">Pause</button>

<button onclick="tambah30(${i})">+30m</button>
<button onclick="tambah1jam(${i})">+1h</button>

<button class="reset" onclick="resetTimer(${i})">Reset</button>

<div class="menuGrid">

${snackHTML}

</div>

<h4>Total : ${total}</h4>

<button class="bayar" onclick="bayar(${i})">Bayar</button>

</div>

`

})

document.getElementById("psContainer").innerHTML=html

renderHistory()

document.getElementById("totalPend").innerText=pendapatan

}

function renderHistory(){

let html=""

transaksi.forEach(t=>{

html+=`
<tr>
<td>${t.tanggal}</td>
<td>${t.ps}</td>
<td>${t.nama}</td>
<td>${t.total}</td>
</tr>
`

})

document.getElementById("history").innerHTML=html

}

function save(){

localStorage.setItem("dataPS",JSON.stringify(dataPS))
localStorage.setItem("trans",JSON.stringify(transaksi))
localStorage.setItem("pend",pendapatan)

}

setInterval(()=>{

dataPS.forEach((p,i)=>{

if(p.jalan){

p.detik--

if(p.detik<=600 && !p.peringatan && p.detik>0){

document.getElementById("alarm10").play()
p.peringatan=true

}

if(p.detik<=0){

p.detik=0
p.jalan=false
document.getElementById("alarm0").play()

}

let timer=document.getElementById("timer"+i)

if(timer){
timer.innerText=format(p.detik)
}

}

})

save()

},1000)

render()

</script>

</body>
</html>
